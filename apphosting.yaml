# Configurações para o Firebase App Hosting
# Documentação: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Região do deploy (us-central1 é a padrão e mais estável)
  region: us-central1
  # Limite de instâncias para controle de custos e performance
  minInstances: 0
  maxInstances: 10
  # Memória disponível para a execução do Next.js
  memory: 512Mi

env:
  - variable: NEXT_PUBLIC_PLATFORM
    value: viby
  - variable: NODE_ENV
    value: production
